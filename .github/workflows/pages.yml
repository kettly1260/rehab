name: Deploy GitHub Pages

on:
  push:
    branches:
      - css-split-migration
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build CSS bundle
        run: node scripts/build-css.mjs

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p public
          cp -r index.html manifest.json sw.js build public/
          cp -r css css-src scripts public/
          cp -r theme.js fooddb.js ai.js data.js food-log.js advice-panel.js backup.js sync.js sync-status.js workout.js workout-engine.js workout-state.js app-update.js public/
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
