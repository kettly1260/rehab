name: Deploy GitHub Pages

on:
  push:
    branches:
      - css-split-migration
      - ui-restructure
      - 'opt/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build CSS bundle
        run: node scripts/build-css.mjs

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p public
          cp -r index.html manifest.json sw.js build public/
          cp -r assets public/
          cp -r css-src scripts public/
          cp -r toast.js theme.js fooddb.js ai-store.js ai-profile.js ai-models.js ai-api.js public/
          cp -r data-utils.js data-store.js data-ui-state.js health-diet.js health-weight.js health-exercise.js goal-plan.js routine-library.js history-view.js data-views.js data.js public/
          cp -r food-log.js advice-panel.js advice-render.js advice-prompt.js backup.js sync.js sync-status.js public/
          cp -r workout-system.js workout-pip.js workout-core.js workout-cardio.js workout-engine.js workout-state.js app-update.js public/
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
