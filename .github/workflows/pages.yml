name: Deploy GitHub Pages

on:
  push:
    branches:
      - css-split-migration
      - ui-restructure
      - 'opt/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build CSS bundle
        run: node scripts/build-css.mjs

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p public
          cp -r index.html manifest.json sw.js build public/
          cp -r assets public/
          cp -r css-src scripts public/
          # Copy every top-level .js file referenced from index.html so newly added modules
          # (e.g. health-profile.js) don't 404 on Pages because someone forgot to extend the list.
          find . -maxdepth 1 -type f -name '*.js' -exec cp {} public/ \;
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
