name: Lighthouse CI

on:
  push:
    branches: ["main", "opt/**"]
  pull_request:
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start static server
        run: npx --yes serve@latest -l 4173 . &

      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:4173 --timeout 60000

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.13 autorun || echo "lhci finished with warnings"
