name: Lighthouse CI

on:
  push:
    branches: ["main", "opt/**"]
  pull_request:

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx --yes serve@latest -l 4173 . &

      - run: npx --yes @lhci/cli@0.13 autorun
