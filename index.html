<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REHAB PRO V12 - Cloud</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0061a4">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --primary: #0061a4; --on-primary: #ffffff; --primary-container: #d1e4ff;
            --on-primary-container: #001d36; --surface: #fdfcff; --surface-variant: #dfe3eb;
            --outline: #73777f; --tertiary: #7d5260; --error: #ba1a1a;
        }
        body {
            background-color: var(--surface); color: #1a1c1e;
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
            padding: env(safe-area-inset-top) 16px 160px 16px;
            display: flex; flex-direction: column; align-items: center;
        }
        .brand { margin: 25px 0; width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box {
            width: 72px; height: 72px; background: var(--primary); border-radius: 24px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            box-shadow: 0 8px 24px rgba(0,97,164,0.2);
        }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
        .tabs { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 16px; position: sticky; top: 10px; z-index: 100; overflow-x: auto; white-space: nowrap; padding: 5px 0; }
        .tab-btn { flex: 1; padding: 10px 16px; border-radius: 24px; border: none; background: var(--surface-variant); font-weight: 600; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: var(--primary-container); color: var(--on-primary-container); }
        
        .card { background-color: var(--surface-variant); border-radius: 28px; padding: 20px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 12px; }
        .timer-panel { background: linear-gradient(135deg, var(--primary-container), #eaf2ff); text-align: center; border: none; position: relative; }
        #mainTime { font-size: 100px; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        input { width: 100%; padding: 12px; border: 1.5px solid var(--outline); border-radius: 14px; background: white; font-size: 14px; box-sizing: border-box; }
        
        .btn { height: 50px; border-radius: 25px; border: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-tonal { background: var(--primary-container); color: var(--on-primary-container); }

        .list-item { background: white; padding: 16px; border-radius: 20px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .controls { position: fixed; bottom: 25px; display: flex; gap: 20px; z-index: 200; align-items: center; }
        .fab { width: 70px; height: 70px; border-radius: 22px; background: var(--primary-container); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #silentAudio { display: none; }
    </style>
</head>
<body>

    <audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <div class="brand">
        <div class="logo-box"><span class="material-symbols-rounded" style="color:white; font-size:44px;">fitness_center</span></div>
        <div style="font-weight: 800; font-size: 22px; letter-spacing: 2px; color: var(--primary);">REHAB PRO V12</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="t-workout" onclick="setTab('workout')">当前训练</button>
        <button class="tab-btn" id="t-routines" onclick="setTab('routines')">方案库</button>
        <button class="tab-btn" id="t-history" onclick="setTab('history')">历史</button>
        <button class="tab-btn" id="t-sync" onclick="setTab('sync')">同步设置</button>
    </div>

    <!-- 1. 训练面板 -->
    <div id="workout" class="section active">
        <!-- 计时面板保持不变... -->
        <div class="card timer-panel">
            <div id="statusText" style="font-weight: 700; opacity: 0.6; font-size: 13px;">READY</div>
            <div id="mainTime">00</div>
            <div id="subText" style="font-size: 18px; font-weight: 600;">准备就绪</div>
            <div id="setInfo" style="margin-top: 5px; font-weight: 700; color: var(--primary);"></div>
        </div>
        
        <!-- 表单部分保持不变... -->
        <div class="card">
            <div class="input-group">
                <input type="text" id="name" class="full" placeholder="动作名称">
                <input type="number" id="sets" placeholder="组数 (Sets)">
                <input type="number" id="reps" placeholder="每组次数 (Reps)">
                <input type="number" id="work" placeholder="单次坚持(秒)">
                <input type="number" id="repRest" placeholder="次间休息(秒)">
                <div class="full" style="display:flex; align-items:center; justify-content:space-between; font-size:14px; padding:4px;">
                    <span>开启交替训练?</span> <input type="checkbox" id="isAlt">
                </div>
                <input type="number" id="switchRest" placeholder="换边休(秒)">
                <input type="number" id="actionRest" placeholder="组间休(秒)">
                <input type="number" id="groupRest" class="full" placeholder="动作间歇(秒)">
            </div>
            <button class="btn btn-primary" onclick="saveAction()" style="margin-top:12px;">保存动作</button>
        </div>
        <div id="currentList"></div>
    </div>

    <!-- 2. 同步设置面板 -->
    <div id="sync" class="section">
        <div class="card">
            <h3>WebDAV 云同步</h3>
            <p style="font-size: 12px; color: gray;">配置后，数据将在每次修改后自动上传，启动时自动拉取。</p>
            <input type="text" id="davUrl" class="full" placeholder="WebDAV 地址 (例如: https://dav.infinitas.jp/)" style="margin-bottom:10px;">
            <input type="text" id="davUser" class="full" placeholder="用户名" style="margin-bottom:10px;">
            <input type="password" id="davPass" class="full" placeholder="应用密码 (App Password)">
            <p id="syncStatus" style="font-size: 12px; color: var(--primary); margin: 10px 0;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-tonal" style="flex:1" onclick="testAndSaveDav()">保存并手动拉取</button>
                <button class="btn btn-tonal" style="flex:1" onclick="manualPush()">手动上传</button>
            </div>
        </div>
    </div>

    <div id="routines" class="section"><div id="routineList"></div></div>
    <div id="history" class="section"><div id="historyList"></div></div>

    <div class="controls">
        <button class="fab" onclick="handlePlay()"><span class="material-symbols-rounded" style="font-size:45px;" id="playIcon">play_arrow</span></button>
    </div>

<script>
    // --- 数据存储核心 ---
    let db = {
        actions: JSON.parse(localStorage.getItem('rp_v12_a')) || [],
        routines: JSON.parse(localStorage.getItem('rp_v12_r')) || [],
        history: JSON.parse(localStorage.getItem('rp_v12_h')) || [],
        rate: localStorage.getItem('rp_v12_rate') || 1.1,
        dav: JSON.parse(localStorage.getItem('rp_v12_dav')) || { url: '', user: '', pass: '' }
    };

    let isPlaying = false, isPaused = false, timer = null;

    // --- WebDAV 同步逻辑 ---
    async function davRequest(method, data = null) {
        if (!db.dav.url || !db.dav.user || !db.dav.pass) return null;
        
        const fileName = "rehab_pro_data.json";
        const fullUrl = db.dav.url.endsWith('/') ? db.dav.url + fileName : db.dav.url + '/' + fileName;
        const auth = btoa(`${db.dav.user}:${db.dav.pass}`);
        
        const options = {
            method: method,
            headers: {
                'Authorization': `Basic ${auth}`,
                'Content-Type': 'application/json'
            }
        };
        if (data) options.body = JSON.stringify(data);

        try {
            const response = await fetch(fullUrl, options);
            if (!response.ok && method === 'GET') return null; 
            return response;
        } catch (e) {
            console.error("WebDAV Error:", e);
            return null;
        }
    }

    async function pushData() {
        document.getElementById('syncStatus').innerText = "正在同步至云端...";
        const res = await davRequest('PUT', { 
            actions: db.actions, 
            routines: db.routines, 
            history: db.history, 
            rate: db.rate 
        });
        document.getElementById('syncStatus').innerText = res ? "同步成功" : "同步失败 (检查 CORS 或账号)";
    }

    async function pullData() {
        document.getElementById('syncStatus').innerText = "正在从云端获取...";
        const res = await davRequest('GET');
        if (res) {
            const cloudData = await res.json();
            if (cloudData) {
                db.actions = cloudData.actions || [];
                db.routines = cloudData.routines || [];
                db.history = cloudData.history || [];
                db.rate = cloudData.rate || 1.1;
                saveLocal();
                render();
                document.getElementById('syncStatus').innerText = "云端数据拉取成功";
            }
        } else {
            document.getElementById('syncStatus').innerText = "云端暂无数据";
        }
    }

    function testAndSaveDav() {
        db.dav.url = document.getElementById('davUrl').value;
        db.dav.user = document.getElementById('davUser').value;
        db.dav.pass = document.getElementById('davPass').value;
        saveLocal();
        pullData();
    }

    function manualPush() { pushData(); }

    // --- 本地持久化 ---
    function saveLocal() {
        localStorage.setItem('rp_v12_a', JSON.stringify(db.actions));
        localStorage.setItem('rp_v12_r', JSON.stringify(db.routines));
        localStorage.setItem('rp_v12_h', JSON.stringify(db.history));
        localStorage.setItem('rp_v12_rate', db.rate);
        localStorage.setItem('rp_v12_dav', JSON.stringify(db.dav));
        // 自动同步：只有数据变动时才推送
        pushData(); 
    }

    // --- 页面初始化 ---
    window.onload = () => {
        document.getElementById('davUrl').value = db.dav.url;
        document.getElementById('davUser').value = db.dav.user;
        document.getElementById('davPass').value = db.dav.pass;
        render();
        // 启动自动拉取
        if (db.dav.url) pullData();
    };

    // --- 原有训练逻辑渲染与控制 (略缩，保持与 v11 一致) ---
    function setTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('t-'+id).classList.add('active');
    }

    function saveAction() {
        const item = {
            name: document.getElementById('name').value || '未命名',
            sets: parseInt(document.getElementById('sets').value) || 1,
            reps: parseInt(document.getElementById('reps').value) || 1,
            work: parseInt(document.getElementById('work').value) || 10,
            repRest: parseInt(document.getElementById('repRest').value) || 0,
            isAlt: document.getElementById('isAlt').checked,
            switchRest: parseInt(document.getElementById('switchRest').value) || 0,
            actionRest: parseInt(document.getElementById('actionRest').value) || 0,
            groupRest: parseInt(document.getElementById('groupRest').value) || 0
        };
        db.actions.push(item);
        saveLocal();
        render();
    }

    function render() {
        document.getElementById('currentList').innerHTML = db.actions.map((a, i) => `
            <div class="list-item">
                <div><strong>${a.name}</strong><br><small>${a.sets}组 | ${a.reps}次 | ${a.work}s</small></div>
                <button onclick="db.actions.splice(${i},1);saveLocal();render();" style="border:none;background:none;color:var(--error);"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');
        // 渲染方案库和历史记录的逻辑同理...
    }

    // 其他播放逻辑（handlePlay, timer, speak等）保持 v11 版本的完整代码即可
    // 关键在于在每一个涉及数据改动的地方（saveAction, delete, 记录产生）调用 saveLocal()
</script>
</body>
</html>
