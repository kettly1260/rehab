<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REHAB PRO V31</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fdfcff">
    <!-- MD3 标准图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <audio id="silentAudio" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <header class="md-top-app-bar">
        <div class="bar-leading">
            <span class="material-symbols-rounded">fitness_center</span>
            <span class="bar-title">康复助手 Pro</span>
        </div>
        <div id="syncStatus" class="md-badge">● 离线模式</div>
    </header>

    <main id="app-viewport">
        <!-- 训练页面 -->
        <section id="workout" class="page active">
            <div class="md-surface-card timer-panel">
                <div class="timer-display">
                    <div id="statusText" class="label-large">READY</div>
                    <div id="mainTime">00</div>
                    <div id="subText" class="title-medium">准备就绪</div>
                    <button class="md-icon-btn skip-action" onclick="skipCurrent()">
                        <span class="material-symbols-rounded">skip_next</span>
                    </button>
                </div>
                <div class="timer-stats">
                    <div class="stat-item"><span>总用时</span><b id="sessionTime">00:00</b></div>
                    <div class="stat-item"><span>进度</span><b><span id="curSet">0</span>/<span id="totalSet">0</span> 组</b></div>
                    <div class="stat-item"><span>次数</span><b><span id="curRep">0</span>/<span id="totalRep">0</span> 次</b></div>
                </div>
            </div>

            <div class="md-surface-card">
                <div class="rate-slider">
                    <span class="label-small">播报语速: <span id="rateLabel">1.1</span>x</span>
                    <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.1" oninput="updateRate()">
                </div>
                <div class="md-input-grid">
                    <div class="input-field span-full"><input type="text" id="name" placeholder="动作名称"></div>
                    <div class="input-field"><input type="number" id="sets" placeholder="组数"></div>
                    <div class="input-field"><input type="number" id="reps" placeholder="次数"></div>
                    <div class="input-field"><input type="number" id="work" placeholder="单次(s)"></div>
                    <div class="input-field"><input type="number" id="repRest" placeholder="次间休(s)"></div>
                    <div class="input-field"><input type="number" id="actionRest" placeholder="组间休(s)"></div>
                    <div class="input-field"><input type="number" id="groupRest" placeholder="项间休(s)"></div>
                    <div class="md-switch-row span-full">
                        <span class="label-medium">双侧交替训练模式</span>
                        <input type="checkbox" id="isAlt">
                    </div>
                </div>
                <button class="md-filled-button" onclick="saveAction()">添加到计划</button>
            </div>

            <div id="currentActionList" class="md-list"></div>

            <div class="md-surface-card routine-box">
                <input type="text" id="newRoutineName" placeholder="为此训练方案命名...">
                <button class="md-tonal-button" onclick="saveToRoutines()">存入方案库</button>
            </div>
        </section>

        <!-- 同步中心 -->
        <section id="sync" class="page">
            <div class="md-surface-card">
                <h3 class="title-large">同步引擎</h3>
                <select id="syncMode" onchange="toggleSyncFields()" class="md-select">
                    <option value="none">仅保存在手机本地</option>
                    <option value="s3">S3 兼容协议 (R2/数据胶囊)</option>
                    <option value="webdav">WebDAV (坚果云等)</option>
                </select>

                <div id="s3Fields" class="hidden">
                    <div class="md-sync-stack">
                        <input type="text" id="s3Endpoint" placeholder="Endpoint (https://...)">
                        <input type="text" id="s3Bucket" placeholder="Bucket Name">
                        <input type="text" id="s3Region" placeholder="Region">
                        <input type="text" id="s3Key" placeholder="Access Key">
                        <input type="password" id="s3Secret" placeholder="Secret Key">
                    </div>
                </div>

                <div class="md-action-bar">
                    <button class="md-filled-button" onclick="saveSyncConfig()">1. 保存同步配置</button>
                    <div class="md-button-row">
                        <button class="md-tonal-button" onclick="manualPull()">从云端拉取配置</button>
                        <button class="md-tonal-button" onclick="manualPush()">立即备份到云端</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="routines" class="page"><div id="routineList" class="md-list"></div></section>
        <section id="history" class="page"><div id="historyList" class="md-list"></div></section>
    </main>

    <nav class="md-bottom-nav">
        <button class="nav-dest active" onclick="navTo('workout', this)"><span class="material-symbols-rounded">fitness_center</span><small>训练</small></button>
        <button class="nav-dest" onclick="navTo('routines', this)"><span class="material-symbols-rounded">bookmarks</span><small>方案库</small></button>
        <button class="nav-dest" onclick="navTo('history', this)"><span class="material-symbols-rounded">history</span><small>历史</small></button>
        <button class="nav-dest" onclick="navTo('sync', this)"><span class="material-symbols-rounded">cloud_sync</span><small>同步</small></button>
    </nav>

    <div class="md-fab-container">
        <button class="md-fab fab-secondary hidden" id="stopBtn" onclick="stopTrainer()"><span class="material-symbols-rounded">stop</span></button>
        <button class="md-fab fab-primary" id="playBtn" onclick="handlePlay()"><span class="material-symbols-rounded" id="playIcon">play_arrow</span></button>
    </div>

    <script src="sync.js"></script>
    <script src="app.js"></script>
</body>
</html>
