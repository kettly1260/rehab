<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REHAB PRO V23</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0061a4">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --primary: #0061a4; --on-primary: #ffffff; --primary-container: #d1e4ff;
            --on-primary-container: #001d36; --surface: #fdfcff; --surface-variant: #f1f3f8;
            --outline: #73777f; --tertiary: #7d5260; --error: #ba1a1a;
        }
        body {
            background-color: var(--surface); color: #1a1c1e;
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
            padding: env(safe-area-inset-top) 8px 140px 8px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 8px; box-sizing: border-box; }
        .brand-mini { display: flex; align-items: center; gap: 6px; }
        .logo-mini { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-mini span { color: white; font-size: 18px; }
        .brand-text { font-weight: 800; font-size: 15px; color: var(--primary); }

        .tabs { display: flex; width: 100%; max-width: 500px; background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px 2px; border-radius: 8px; border: none; background: transparent; font-weight: 600; cursor: pointer; font-size: 12px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: var(--primary-container); color: var(--on-primary-container); }

        .card { background: white; border-radius: 16px; padding: 14px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .timer-panel { background: var(--on-primary-container); color: white; text-align: center; position: relative; }
        #mainTime { font-size: 80px; font-weight: 800; line-height: 1; margin: 8px 0; color: var(--primary-container); font-variant-numeric: tabular-nums; }
        .progress-info { display: flex; justify-content: space-around; font-size: 13px; opacity: 0.9; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        
        .skip-btn { position: absolute; right: 12px; top: 12px; color: white; opacity: 0.5; cursor: pointer; padding: 4px; }
        .skip-btn:active { opacity: 1; transform: scale(1.1); }

        .list-item { background: white; padding: 10px 12px; border-radius: 14px; margin: 6px 0; display: flex; align-items: center; border: 1px solid #eee; }
        .action-content { flex: 1; margin-left: 8px; cursor: pointer; }
        .sort-btns { display: flex; flex-direction: column; gap: 2px; }
        .sort-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 4px; padding: 2px; line-height: 0; cursor: pointer; }
        .sort-btn span { font-size: 16px; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .span-3 { grid-column: span 3; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn { height: 44px; border-radius: 10px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-tonal { background: var(--primary-container); color: var(--on-primary-container); }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 12px; align-items: center; z-index: 1000; }
        .fab { width: 64px; height: 64px; border-radius: 20px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 15px rgba(0,97,164,0.3); }
        .fab-stop { width: 50px; height: 50px; background: var(--error); }
        
        .section { display: none; width: 100%; max-width: 500px; }
        .section.active { display: block; }
        .hidden { display: none; }
        #silentAudio { display: none; }
        
        .history-detail { margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; }
        .detail-row { font-size: 11px; color: #666; display: flex; justify-content: space-between; margin-bottom: 2px; }
    </style>
</head>
<body>

    <audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <header class="header">
        <div class="brand-mini">
            <div class="logo-mini"><span class="material-symbols-rounded">fitness_center</span></div>
            <div class="brand-text">REHAB PRO</div>
        </div>
        <div id="syncStatus" style="font-size: 10px; font-weight: bold; color: gray;">● LOCAL</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-workout" onclick="setTab('workout')">训练</button>
        <button class="tab-btn" id="btn-routines" onclick="setTab('routines')">方案库</button>
        <button class="tab-btn" id="btn-history" onclick="setTab('history')">历史</button>
        <button class="tab-btn" id="btn-sync" onclick="setTab('sync')">同步</button>
    </nav>

    <!-- 1. 训练面板 -->
    <div id="workout" class="section active">
        <div class="card timer-panel">
            <div id="statusText" style="font-size: 12px; font-weight: bold; color: var(--primary-container);">READY</div>
            <div class="skip-btn" onclick="skipCurrent()"><span class="material-symbols-rounded">skip_next</span></div>
            <div id="mainTime">00</div>
            <div id="subText" style="font-size: 16px; font-weight: bold; margin-bottom: 4px;">等待开始</div>
            <div class="progress-info">
                <div>组: <span id="curSet">0</span>/<span id="totalSet">0</span></div>
                <div>次: <span id="curRep">0</span>/<span id="totalRep">0</span></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:12px; font-weight:600;">语速: <span id="rateLabel">1.1</span>x</span>
                <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.1" style="width:140px;" oninput="updateRate()">
            </div>
            <div class="input-grid">
                <input type="text" id="name" class="span-3" placeholder="动作名称">
                <input type="number" id="sets" placeholder="组数">
                <input type="number" id="reps" placeholder="次数">
                <input type="number" id="work" placeholder="坚持(s)">
                <input type="number" id="repRest" placeholder="次间休(s)">
                <input type="number" id="actionRest" placeholder="组间休(s)">
                <input type="number" id="groupRest" placeholder="项间休(s)">
                <div class="span-3" style="display:flex; align-items:center; justify-content:space-between; font-size:13px; background:#f5f5f5; padding:8px; border-radius:8px;">
                    <span>左右交替训练</span> <input type="checkbox" id="isAlt">
                </div>
                <input type="number" id="switchRest" class="span-3" placeholder="换边休息时长 (秒)">
            </div>
            <button class="btn btn-primary" onclick="saveAction()" id="saveBtn" style="margin-top:10px;">添加到当前计划</button>
        </div>

        <div id="currentActionList"></div>

        <div class="card" style="border: 1px dashed var(--outline); background:transparent;">
            <input type="text" id="newRoutineName" placeholder="为此方案命名..." style="margin-bottom:8px;">
            <button class="btn btn-primary" style="background:var(--tertiary);" onclick="saveToRoutines()">
                <span class="material-symbols-rounded">stars</span> 保存为固定方案
            </button>
        </div>
    </div>

    <!-- 2. 同步设置 -->
    <div id="sync" class="section">
        <div class="card">
            <h3 style="margin:0 0 10px 0; font-size:16px;">同步引擎</h3>
            <select id="syncMode" onchange="toggleSyncFields()" style="margin-bottom:10px;">
                <option value="none">关闭同步</option>
                <option value="s3">S3 兼容协议 (CAS数据胶囊/R2)</option>
                <option value="webdav">WebDAV (坚果云等)</option>
            </select>
            <div id="s3Fields" class="hidden">
                <input type="text" id="s3Endpoint" placeholder="Endpoint (含 https://)" style="margin-bottom:6px;">
                <input type="text" id="s3Bucket" placeholder="Bucket Name" style="margin-bottom:6px;">
                <input type="text" id="s3Region" placeholder="Region (如 auto)" style="margin-bottom:6px;">
                <div style="display:flex; gap:6px; margin-bottom:6px;"><input type="text" id="s3Key" placeholder="Access Key"><input type="password" id="s3Secret" placeholder="Secret Key"></div>
            </div>
            <div id="webdavFields" class="hidden">
                <input type="text" id="davUrl" placeholder="WebDAV 地址" style="margin-bottom:6px;">
                <div style="display:flex; gap:6px;"><input type="text" id="davUser" placeholder="用户名"><input type="password" id="davPass" placeholder="密码"></div>
            </div>
            <button class="btn btn-primary" onclick="saveSyncConfig()" style="margin-top:10px; background:var(--tertiary);">保存配置</button>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-primary" style="flex:1" onclick="manualPush()">立即上传</button>
                <button class="btn btn-primary" style="flex:1" onclick="manualPull()">立即下载</button>
            </div>
        </div>
        <button class="btn" style="width:100%; border:1px solid #ccc; background:white;" onclick="exportData()">导出 JSON 备份</button>
    </div>

    <div id="routines" class="section"><div id="routineList"></div></div>
    <div id="history" class="section"><div id="historyList"></div></div>

    <div class="controls">
        <button class="fab fab-stop hidden" id="stopBtn" onclick="stopTrainer()"><span class="material-symbols-rounded">stop</span></button>
        <button class="fab" onclick="handlePlay()"><span class="material-symbols-rounded" style="font-size:48px;" id="playIcon">play_arrow</span></button>
    </div>

<script>
    // --- 加密辅助 ---
    async function sha256(str) { const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)); return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join(""); }
    async function hmac(key, data) { const cKey = typeof key === "string" ? new TextEncoder().encode(key) : key; const cryptoKey = await crypto.subtle.importKey("raw", cKey, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]); return await crypto.subtle.sign("HMAC", cryptoKey, new TextEncoder().encode(data)); }

    // --- 数据持久化与向前兼容 ---
    const DB_KEY = 'rp_v23_db';
    const CFG_KEY = 'rp_v23_cfg';

    function migrateData() {
        const legacyKeys = ['rp_v21_main', 'rp_v20_a', 'rp_v18_a', 'rp_v15_a', 'rp_data_actions'];
        let migratedData = { actions: [], routines: [], history: [], rate: 1.1 };
        
        // 尝试从旧版本导入动作列表
        for (const key of legacyKeys) {
            const old = localStorage.getItem(key);
            if (old) {
                try {
                    const parsed = JSON.parse(old);
                    // 兼容 v21 的全量结构或旧版的纯动作数组结构
                    migratedData.actions = parsed.actions || parsed;
                    break; 
                } catch(e) {}
            }
        }
        // 导入配置
        const oldCfg = localStorage.getItem('rp_v21_config') || localStorage.getItem('rp_v16_cfg');
        let migratedCfg = { mode: 'none', s3: {}, dav: {} };
        if (oldCfg) migratedCfg = JSON.parse(oldCfg);

        return { data: migratedData, cfg: migratedCfg };
    }

    let db = JSON.parse(localStorage.getItem(DB_KEY));
    let cfg = JSON.parse(localStorage.getItem(CFG_KEY));

    // 如果是新安装或更新，执行迁移
    if (!db) {
        const migrated = migrateData();
        db = migrated.data;
        cfg = migrated.cfg;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
    }

    let isPlaying = false, isPaused = false, timerInterval = null, skipFlag = false, startTime = null;

    window.onload = () => { initUI(); render(); initMediaSession(); if(cfg.mode !== 'none') autoPull(); };

    function initUI() {
        document.getElementById('ttsRate').value = db.rate;
        document.getElementById('rateLabel').innerText = db.rate;
        document.getElementById('syncMode').value = cfg.mode;
        if(cfg.s3) {
            document.getElementById('s3Endpoint').value = cfg.s3.endpoint || '';
            document.getElementById('s3Bucket').value = cfg.s3.bucket || '';
            document.getElementById('s3Region').value = cfg.s3.region || '';
            document.getElementById('s3Key').value = cfg.s3.key || '';
            document.getElementById('s3Secret').value = cfg.s3.secret || '';
        }
        if(cfg.dav) {
            document.getElementById('davUrl').value = cfg.dav.url || '';
            document.getElementById('davUser').value = cfg.dav.user || '';
            document.getElementById('davPass').value = cfg.dav.pass || '';
        }
        toggleSyncFields();
    }

    function toggleSyncFields() {
        const m = document.getElementById('syncMode').value;
        document.getElementById('s3Fields').classList.toggle('hidden', m !== 's3');
        document.getElementById('webdavFields').classList.toggle('hidden', m !== 'webdav');
    }

    function syncLocal(push = true) {
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        if(push && cfg.mode !== 'none') syncPush();
        render();
    }

    // --- 同步请求引擎 ---
    async function s3Req(method, body = null) {
        const { endpoint, bucket, region, key, secret } = cfg.s3;
        const urlObj = new URL(endpoint);
        const host = urlObj.host;
        const path = `/${bucket}/rehab_v23.json`;
        const datetime = new Date().toISOString().replace(/[:\-]|\.\d{3}/g, '');
        const date = datetime.slice(0, 8);
        const hashedPayload = body ? await sha256(body) : "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855";
        const canonicalRequest = `${method}\n${path}\n\nhost:${host}\nx-amz-content-sha256:${hashedPayload}\nx-amz-date:${datetime}\n\nhost;x-amz-content-sha256;x-amz-date\n${hashedPayload}`;
        const scope = `${date}/${region}/s3/aws4_request`;
        const stringToSign = `AWS4-HMAC-SHA256\n${datetime}\n${scope}\n${await sha256(canonicalRequest)}`;
        const kDate = await hmac("AWS4" + secret, date);
        const kRegion = await hmac(kDate, region);
        const kService = await hmac(kRegion, "s3");
        const kSigning = await hmac(kService, "aws4_request");
        const signature = Array.from(new Uint8Array(await hmac(kSigning, stringToSign))).map(b => b.toString(16).padStart(2, "0")).join("");
        return fetch(`${endpoint}${path}`, { method, headers: { 'Authorization': `AWS4-HMAC-SHA256 Credential=${key}/${scope}, SignedHeaders=host;x-amz-content-sha256;x-amz-date, Signature=${signature}`, 'x-amz-date': datetime, 'x-amz-content-sha256': hashedPayload }, body });
    }

    async function davReq(method, body = null) {
        const { url, user, pass } = cfg.dav;
        const auth = btoa(`${user}:${pass}`);
        return fetch(url.endsWith('/') ? url+'rehab_v23.json' : url+'/rehab_v23.json', { method, headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }, body });
    }

    async function syncPush() {
        if(cfg.mode === 'none') return;
        updateStatus("● UPLOADING", "orange");
        try {
            const res = (cfg.mode === 's3') ? await s3Req('PUT', JSON.stringify(db)) : await davReq('PUT', JSON.stringify(db));
            updateStatus(res.ok ? "● SYNCED" : "● ERROR", res.ok ? "green" : "red");
        } catch(e) { updateStatus("● OFFLINE", "red"); }
    }

    async function autoPull() {
        if(cfg.mode === 'none') return;
        updateStatus("● PULLING", "orange");
        try {
            const res = (cfg.mode === 's3') ? await s3Req('GET') : await davReq('GET');
            if(res.ok) {
                const cloud = await res.json();
                if(cloud && cloud.actions) { db = cloud; localStorage.setItem(DB_KEY, JSON.stringify(db)); render(); updateStatus("● SYNCED", "green"); }
            }
        } catch(e) { updateStatus("● LOCAL", "gray"); }
    }

    function saveSyncConfig() {
        cfg.mode = document.getElementById('syncMode').value;
        cfg.s3 = { endpoint: document.getElementById('s3Endpoint').value, bucket: document.getElementById('s3Bucket').value, region: document.getElementById('s3Region').value, key: document.getElementById('s3Key').value, secret: document.getElementById('s3Secret').value };
        cfg.dav = { url: document.getElementById('davUrl').value, user: document.getElementById('davUser').value, pass: document.getElementById('davPass').value };
        localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
        alert("配置已保存");
    }

    function manualPush() { if(confirm("上传本地数据覆盖云端？")) syncPush(); }
    function manualPull() { if(confirm("下载云端备份覆盖本地？")) autoPull().then(() => alert("拉取完成")); }
    function updateStatus(t, c) { const el = document.getElementById('syncStatus'); el.innerText = t; el.style.color = c; }

    // --- 康复计时与语音引擎 ---
    function updateRate() { db.rate = document.getElementById('ttsRate').value; document.getElementById('rateLabel').innerText = db.rate; syncLocal(false); }
    function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-CN'; u.rate=parseFloat(db.rate); window.speechSynthesis.speak(u); }

    function initMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => handlePlay());
            navigator.mediaSession.setActionHandler('pause', () => handlePlay());
            navigator.mediaSession.setActionHandler('nexttrack', () => skipCurrent());
        }
    }

    async function handlePlay() {
        if (!isPlaying) {
            if (db.actions.length === 0) return;
            isPlaying = true; isPaused = false; startTime = Date.now();
            document.getElementById('playIcon').innerText = 'pause';
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('silentAudio').play();
            await runSequence();
        } else {
            isPaused = !isPaused;
            document.getElementById('playIcon').innerText = isPaused ? 'play_arrow' : 'pause';
            if(isPaused) window.speechSynthesis.pause(); else window.speechSynthesis.resume();
        }
    }

    async function runSequence() {
        for (let i = 0; i < db.actions.length; i++) {
            const a = db.actions[i];
            updateMediaMetadata(a.name, "正在训练");
            for (let s = 1; s <= a.sets; s++) {
                if (!isPlaying) return;
                document.getElementById('totalSet').innerText = a.sets;
                document.getElementById('curSet').innerText = s;
                const sides = a.isAlt ? ['左侧', '右侧'] : [''];
                
                for (let side of sides) {
                    if (!isPlaying) return;
                    // 动作预告
                    speak(s === 1 && side === sides[0] ? `现在开始训练：${a.name}` : (side || `第${s}组`));
                    
                    for (let r = 1; r <= a.reps; r++) {
                        if (!isPlaying) return;
                        document.getElementById('totalRep').innerText = a.reps;
                        document.getElementById('curRep').innerText = r;
                        speak(`第${r}次`);
                        await timer(a.work, `${a.name} ${side}`, 'HOLD');
                        if (r < a.reps && isPlaying) await timer(a.repRest, "次间休", "REST");
                    }
                    if (a.isAlt && side === '左侧' && isPlaying) {
                        speak("准备换边");
                        await timer(a.switchRest, "换边休息", "SWITCH");
                    }
                }
                if (s < a.sets && isPlaying) { speak(`组间休息`); await timer(a.actionRest, "组间休息", "SET REST"); }
            }
            if (i < db.actions.length - 1 && isPlaying) { speak(`下一个：${db.actions[i+1].name}`); await timer(a.groupRest, "切换动作", "BREAK"); }
        }
        finishTraining();
    }

    function timer(sec, title, status) {
        return new Promise(res => {
            let left = sec;
            document.getElementById('subText').innerText = title;
            document.getElementById('statusText').innerText = status;
            timerInterval = setInterval(() => {
                if (!isPlaying || skipFlag) { clearInterval(timerInterval); skipFlag = false; res(); return; }
                if (isPaused) return;
                document.getElementById('mainTime').innerText = left;
                if (left <= 3 && left > 0) speak(left.toString()); // 倒计时播报
                if (left <= 0) { clearInterval(timerInterval); res(); }
                left--;
            }, 1000);
        });
    }

    function skipCurrent() { skipFlag = true; speak("跳过"); }
    function stopTrainer() { if(confirm("停止训练？")) finishTraining(); }

    function finishTraining() {
        if(isPlaying) speak("训练圆满完成");
        isPlaying = false; clearInterval(timerInterval);
        document.getElementById('playIcon').innerText = 'play_arrow';
        document.getElementById('stopBtn').classList.add('hidden');
        document.getElementById('mainTime').innerText = '00';
        document.getElementById('silentAudio').pause();
        saveHistory();
    }

    function updateMediaMetadata(title, status) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title, artist: 'REHAB PRO', album: status });
        }
    }

    // --- 业务数据管理 ---
    function setTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        render();
    }

    function saveAction() {
        const a = { name: document.getElementById('name').value || '未命名', sets: parseInt(document.getElementById('sets').value) || 1, reps: parseInt(document.getElementById('reps').value) || 1, work: parseInt(document.getElementById('work').value) || 5, repRest: parseInt(document.getElementById('repRest').value) || 2, isAlt: document.getElementById('isAlt').checked, switchRest: parseInt(document.getElementById('switchRest').value) || 3, actionRest: parseInt(document.getElementById('actionRest').value) || 10, groupRest: parseInt(document.getElementById('groupRest').value) || 15 };
        db.actions.push(a); syncLocal(); document.getElementById('name').value = '';
    }

    function moveAction(idx, dir) {
        if(dir===-1 && idx>0) [db.actions[idx], db.actions[idx-1]] = [db.actions[idx-1], db.actions[idx]];
        else if(dir===1 && idx<db.actions.length-1) [db.actions[idx], db.actions[idx+1]] = [db.actions[idx+1], db.actions[idx]];
        syncLocal();
    }

    function saveToRoutines() {
        const n = document.getElementById('newRoutineName').value;
        if(!n || db.actions.length === 0) return;
        db.routines.push({ name: n, actions: JSON.parse(JSON.stringify(db.actions)) });
        document.getElementById('newRoutineName').value = ''; syncLocal(); alert("方案已入库");
    }

    function saveHistory() {
        const d = Math.round((Date.now()-startTime)/1000);
        if(d < 10) return;
        db.history.unshift({ date: new Date().toLocaleString(), duration: d, actions: JSON.parse(JSON.stringify(db.actions)) });
        syncLocal();
    }

    function render() {
        document.getElementById('currentActionList').innerHTML = db.actions.map((a, i) => `
            <div class="list-item">
                <div class="sort-btns">
                    <button class="sort-btn" onclick="moveAction(${i},-1)"><span class="material-symbols-rounded">expand_less</span></button>
                    <button class="sort-btn" onclick="moveAction(${i},1)"><span class="material-symbols-rounded">expand_more</span></button>
                </div>
                <div class="action-content" onclick="editAction(${i})">
                    <strong>${a.name}</strong><br><small>${a.sets}组 x ${a.reps}次 | ${a.work}s | ${a.isAlt?'交替':''}</small>
                </div>
                <button onclick="db.actions.splice(${i},1);syncLocal();" style="border:none;background:none;color:var(--error);"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');

        document.getElementById('routineList').innerHTML = db.routines.map((r, i) => `
            <div class="list-item">
                <div style="flex:1"><strong>${r.name}</strong><br><small>${r.actions.length}个动作</small></div>
                <button class="tab-btn active" style="width:auto; margin-right:8px;" onclick="db.actions=JSON.parse(JSON.stringify(db.routines[${i}].actions)); syncLocal(); setTab('workout');">载入</button>
                <button onclick="db.routines.splice(${i},1);syncLocal();" style="border:none;background:none;color:var(--error);"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');

        document.getElementById('historyList').innerHTML = db.history.map((h, i) => `
            <div class="list-item" style="flex-direction:column; align-items:flex-start;">
                <div style="width:100%; display:flex; justify-content:space-between">
                    <small style="opacity:0.6;">${h.date}</small>
                    <button onclick="db.history.splice(${i},1);syncLocal();" style="border:none;background:none;"><span class="material-symbols-rounded" style="font-size:16px;">close</span></button>
                </div>
                <strong>时长: ${Math.floor(h.duration/60)}分${h.duration%60}秒</strong>
                <div class="history-detail">${h.actions.map(a => `<div class="detail-row"><span>${a.name}</span><span>${a.sets}x${a.reps}</span></div>`).join('')}</div>
            </div>
        `).join('');
    }

    function editAction(i) {
        const a = db.actions[i];
        document.getElementById('name').value = a.name;
        document.getElementById('sets').value = a.sets;
        document.getElementById('reps').value = a.reps;
        document.getElementById('work').value = a.work;
        document.getElementById('isAlt').checked = a.isAlt;
        db.actions.splice(i, 1);
        render();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'rehab_backup.json'; a.click();
    }

    if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
</script>
</body>
</html>
