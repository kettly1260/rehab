<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>康复助手 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0061a4">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <audio id="silentAudio" loop preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <header class="md-top-app-bar">
        <div class="bar-leading"><span class="material-symbols-rounded">fitness_center</span><span>康复助手 Pro</span></div>
        <div id="syncStatus" class="md-badge">● LOCAL</div>
    </header>

    <main id="app">
        <!-- 训练页 -->
        <section id="workout" class="page active">
            <div class="md-card timer-panel">
                <span class="skip-btn" onclick="workout.skip()"><span class="material-symbols-rounded">skip_next</span></span>
                <div id="statusText">READY</div>
                <div id="mainTime">00</div>
                <div id="subText">准备就绪</div>
                <div class="timer-stats">
                    <div class="stat-item">总用时<b id="sessionTime">00:00</b></div>
                    <div class="stat-item">组数<b><span id="curSet">0</span>/<span id="totalSet">0</span></b></div>
                    <div class="stat-item">次数<b><span id="curRep">0</span>/<span id="totalRep">0</span></b></div>
                </div>
            </div>

            <div class="md-card">
                <div class="rate-row">
                    <span>播报语速: <span id="rateLabel">1.1</span>x</span>
                    <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.1" oninput="workout.updateRate(this.value)">
                </div>
                <div class="md-grid">
                    <input type="text" id="name" class="span-full" placeholder="动作名称">
                    <input type="number" id="sets" placeholder="组数">
                    <input type="number" id="reps" placeholder="次数">
                    <input type="number" id="work" placeholder="单次(s)">
                    <input type="number" id="repRest" placeholder="次休(s)">
                    <input type="number" id="actionRest" placeholder="组休(s)">
                    <input type="number" id="groupRest" placeholder="项休(s)">
                    <div class="md-switch span-full"><span>双侧交替训练</span><input type="checkbox" id="isAlt"></div>
                </div>
                <button class="md-btn md-btn-filled" onclick="data.addAction()">添加到计划</button>
            </div>
            <div id="currentActionList"></div>
            <div class="md-card routine-tool">
                <input type="text" id="newRoutineName" placeholder="为此方案命名...">
                <button class="md-btn md-btn-tonal" onclick="data.saveRoutine()">存入方案库</button>
            </div>
        </section>

        <!-- 方案页/历史页/同步页 -->
        <section id="routines" class="page"><div id="routineList"></div></section>
        <section id="history" class="page"><div id="historyList"></div></section>
        <section id="sync" class="page">
            <div class="md-card">
                <h3>同步中心</h3>
                <select id="syncMode" onchange="sync.toggleFields(this.value)" class="md-select">
                    <option value="none">关闭同步</option>
                    <option value="s3">S3 协议</option>
                    <option value="webdav">WebDAV</option>
                </select>
                <div id="s3Fields" class="hidden">
                    <input type="text" id="s3Endpoint" placeholder="Endpoint">
                    <input type="text" id="s3Bucket" placeholder="Bucket">
                    <input type="text" id="s3Key" placeholder="Access Key">
                    <input type="password" id="s3Secret" placeholder="Secret Key">
                </div>
                <div class="sync-actions">
                    <button class="md-btn md-btn-filled" onclick="sync.saveConfig()">1. 保存配置</button>
                    <div class="md-row">
                        <button class="md-btn md-btn-tonal" onclick="sync.pull()">↓ 下载</button>
                        <button class="md-btn md-btn-tonal" onclick="sync.push()">↑ 备份</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="md-bottom-nav">
        <button class="nav-item active" onclick="ui.tab('workout', this)"><span class="material-symbols-rounded">exercise</span><small>训练</small></button>
        <button class="nav-item" onclick="ui.tab('routines', this)"><span class="material-symbols-rounded">bookmarks</span><small>方案</small></button>
        <button class="nav-item" onclick="ui.tab('history', this)"><span class="material-symbols-rounded">history</span><small>历史</small></button>
        <button class="nav-item" onclick="ui.tab('sync', this)"><span class="material-symbols-rounded">sync</span><small>同步</small></button>
    </nav>

    <div class="fab-group">
        <button class="md-fab fab-stop hidden" id="stopBtn" onclick="workout.stop()"><span class="material-symbols-rounded">stop</span></button>
        <button class="md-fab fab-play" id="playBtn" onclick="workout.toggle()"><span class="material-symbols-rounded" id="playIcon">play_arrow</span></button>
    </div>

    <!-- 严格依赖顺序 -->
    <script src="data.js"></script>
    <script src="sync.js"></script>
    <script src="workout.js"></script>
    <script>
        const ui = {
            tab: (id, el) => {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                el.classList.add('active');
                data.render();
            }
        };
        window.onload = () => {
            data.init();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        };
    </script>
</body>
</html>
