<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REHAB PRO V27</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0061a4">
    <!-- 引入图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --primary: #0061a4; --on-primary: #ffffff; --primary-container: #d1e4ff;
            --on-primary-container: #001d36; --surface: #fdfcff; --surface-variant: #f1f3f8;
            --outline: #73777f; --tertiary: #7d5260; --error: #ba1a1a;
        }
        body {
            background-color: var(--surface); color: #1a1c1e;
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
            padding: env(safe-area-inset-top) 8px 140px 8px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 8px; box-sizing: border-box; }
        .brand-mini { display: flex; align-items: center; gap: 6px; }
        .logo-mini { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-mini span { color: white; font-size: 18px; }
        .brand-text { font-weight: 800; font-size: 15px; color: var(--primary); }

        .tabs { display: flex; width: 100%; max-width: 500px; background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px 2px; border-radius: 8px; border: none; background: transparent; font-weight: 600; cursor: pointer; font-size: 12px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { background: var(--primary-container); color: var(--on-primary-container); }

        .card { background: white; border-radius: 16px; padding: 14px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .timer-panel { background: var(--on-primary-container); color: white; text-align: center; position: relative; }
        #mainTime { font-size: 80px; font-weight: 800; line-height: 1; margin: 6px 0; color: var(--primary-container); font-variant-numeric: tabular-nums; }
        
        .progress-info { display: flex; justify-content: space-around; font-size: 12px; opacity: 0.9; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        #sessionTime { color: #ffd166; font-weight: bold; }

        .skip-btn { position: absolute; right: 12px; top: 12px; color: white; opacity: 0.5; cursor: pointer; padding: 4px; z-index: 10; }
        .list-item { background: white; padding: 10px 12px; border-radius: 14px; margin: 6px 0; display: flex; align-items: center; border: 1px solid #eee; }
        .action-content { flex: 1; margin-left: 8px; cursor: pointer; }
        
        .sort-btns { display: flex; flex-direction: column; gap: 2px; margin-right: 4px; }
        .sort-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 4px; padding: 4px; line-height: 0; cursor: pointer; }
        .sort-btn span { font-size: 20px !important; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .span-3 { grid-column: span 3; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn { height: 44px; border-radius: 10px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 12px; align-items: center; z-index: 1000; }
        .fab { width: 64px; height: 64px; border-radius: 20px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 15px rgba(0,97,164,0.3); }
        .fab-stop { width: 50px; height: 50px; background: var(--error); }
        .section { display: none; width: 100%; max-width: 500px; }
        .section.active { display: block; }
        #silentAudio { display: none; }
    </style>
</head>
<body>

    <audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <header class="header">
        <div class="brand-mini">
            <div class="logo-mini"><span class="material-symbols-rounded">fitness_center</span></div>
            <div class="brand-text">REHAB PRO V27</div>
        </div>
        <div id="syncStatus" style="font-size: 10px; font-weight: bold; color: gray;">● LOCAL</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-workout" onclick="setTab('workout')">训练</button>
        <button class="tab-btn" id="btn-routines" onclick="setTab('routines')">方案</button>
        <button class="tab-btn" id="btn-history" onclick="setTab('history')">历史</button>
        <button class="tab-btn" id="btn-sync" onclick="setTab('sync')">同步</button>
    </nav>

    <!-- 1. 训练面板 -->
    <div id="workout" class="section active">
        <div class="card timer-panel">
            <div id="statusText" style="font-size: 12px; font-weight: bold; color: var(--primary-container);">READY</div>
            <div class="skip-btn" onclick="skipCurrent()"><span class="material-symbols-rounded">skip_next</span></div>
            <div id="mainTime">00</div>
            <div id="subText" style="font-size: 16px; font-weight: bold; margin-bottom: 4px;">准备绪</div>
            <div class="progress-info">
                <div>用时 <span id="sessionTime">00:00</span></div>
                <div>组: <span id="curSet">0</span>/<span id="totalSet">0</span></div>
                <div>次: <span id="curRep">0</span>/<span id="totalRep">0</span></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:12px; font-weight:600;">语速: <span id="rateLabel">1.1</span>x</span>
                <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.1" style="width:140px;" oninput="updateRate()">
            </div>
            <div class="input-grid">
                <input type="text" id="name" class="span-3" placeholder="动作名称">
                <input type="number" id="sets" placeholder="组数">
                <input type="number" id="reps" placeholder="次数">
                <input type="number" id="work" placeholder="维持(s)">
                <input type="number" id="repRest" placeholder="次间休(s)">
                <input type="number" id="actionRest" placeholder="组间休(s)">
                <input type="number" id="groupRest" placeholder="项间休(s)">
                <div class="span-3" style="display:flex; align-items:center; justify-content:space-between; font-size:12px; background:#f5f5f5; padding:8px; border-radius:8px;">
                    <span>左右交替</span> <input type="checkbox" id="isAlt">
                </div>
                <input type="number" id="switchRest" class="span-3" placeholder="换边休息时长 (秒)">
            </div>
            <button class="btn btn-primary" onclick="saveAction()" id="saveBtn" style="margin-top:10px;">添加动作</button>
        </div>
        <div id="currentActionList"></div>
    </div>

    <!-- 同步设置页面 -->
    <div id="sync" class="section">
        <div class="card">
            <h3>同步设置</h3>
            <select id="syncMode" onchange="toggleSyncFields()" style="margin-bottom:10px;">
                <option value="none">关闭同步</option>
                <option value="s3">S3 协议</option>
                <option value="webdav">WebDAV</option>
            </select>
            <div id="s3Fields" class="hidden">
                <input type="text" id="s3Endpoint" placeholder="Endpoint"><input type="text" id="s3Bucket" placeholder="Bucket">
                <div style="display:flex; gap:5px;"><input type="text" id="s3Key" placeholder="AccessKey"><input type="password" id="s3Secret" placeholder="SecretKey"></div>
            </div>
            <button class="btn btn-primary" onclick="saveSyncConfig()" style="margin-top:10px;">保存配置</button>
            <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-primary" style="flex:1" onclick="manualPush()">上传备份</button><button class="btn btn-primary" style="flex:1" onclick="manualPull()">下载数据</button></div>
        </div>
    </div>
    <div id="routines" class="section"><div id="routineList"></div></div>
    <div id="history" class="section"><div id="historyList"></div></div>

    <div class="controls">
        <button class="fab fab-stop hidden" id="stopBtn" onclick="stopTrainer()"><span class="material-symbols-rounded">stop</span></button>
        <button class="fab" onclick="handlePlay()"><span class="material-symbols-rounded" style="font-size:48px;" id="playIcon">play_arrow</span></button>
    </div>

<script>
    // --- 基础配置与数据迁移 ---
    const DB_KEY = 'rp_v27_db';
    const CFG_KEY = 'rp_v27_cfg';
    const legacyKeys = ['rp_v26_db', 'rp_v25_db', 'rp_v24_db', 'rp_v21_main'];

    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { actions: [], routines: [], history: [], rate: 1.1 };
    let cfg = JSON.parse(localStorage.getItem(CFG_KEY)) || { mode: 'none', s3: {}, dav: {} };

    // 自动寻找旧数据
    if (db.actions.length === 0) {
        for (let k of legacyKeys) {
            let old = localStorage.getItem(k);
            if (old) { try { db = JSON.parse(old); break; } catch(e){} }
        }
    }

    // --- 核心语音系统 (带保险丝) ---
    function speak(t) {
        return new Promise((resolve) => {
            if (!t) return resolve();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-CN';
            u.rate = parseFloat(db.rate);
            
            let isResolved = false;
            // 5秒强制超时保险丝，防止浏览器挂起
            const timeout = setTimeout(() => {
                if (!isResolved) { isResolved = true; resolve(); }
            }, 5000);

            u.onend = () => { if (!isResolved) { isResolved = true; clearTimeout(timeout); resolve(); } };
            u.onerror = () => { if (!isResolved) { isResolved = true; clearTimeout(timeout); resolve(); } };
            window.speechSynthesis.speak(u);
        });
    }

    // --- 训练引擎逻辑 ---
    let isPlaying = false, isPaused = false, timerInterval = null, sessionInterval = null;
    let skipFlag = false, totalSessionSeconds = 0;

    async function handlePlay() {
        if (!isPlaying) {
            if (db.actions.length === 0) return;
            isPlaying = true; isPaused = false; totalSessionSeconds = 0;
            document.getElementById('playIcon').innerText = 'pause';
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('silentAudio').play();
            
            // 总用时计时
            sessionInterval = setInterval(() => { if(!isPaused) { totalSessionSeconds++; updateSessionUI(); } }, 1000);

            await speak("现在开始康复训练");
            runFullSequence(); // 不要加 await，让它进入背景循环
        } else {
            isPaused = !isPaused;
            document.getElementById('playIcon').innerText = isPaused ? 'play_arrow' : 'pause';
        }
    }

    async function runFullSequence() {
        for (let i = 0; i < db.actions.length; i++) {
            if (!isPlaying) break;
            const a = db.actions[i];
            updateMediaMetadata(a.name, "正在训练");
            await speak(`下一项：${a.name}`);

            for (let s = 1; s <= a.sets; s++) {
                if (!isPlaying) break;
                document.getElementById('totalSet').innerText = a.sets;
                document.getElementById('curSet').innerText = s;
                
                const sides = a.isAlt ? ['左侧', '右侧'] : [''];
                for (let side of sides) {
                    if (!isPlaying) break;
                    if (side) await speak(`${side}开始`);
                    else if (a.sets > 1) await speak(`第${s}组`);

                    for (let r = 1; r <= a.reps; r++) {
                        if (!isPlaying) break;
                        document.getElementById('totalRep').innerText = a.reps;
                        document.getElementById('curRep').innerText = r;
                        
                        await speak(`第${r}次`);
                        await timer(a.work, `${a.name} ${side}`, 'HOLD');
                        
                        if (r < a.reps && isPlaying) {
                            await speak("放松");
                            await timer(a.repRest, "放松", "REST");
                        }
                    }
                    if (a.isAlt && side === '左侧' && isPlaying) {
                        await speak("准备换边");
                        await timer(a.switchRest, "换边", "SWITCH");
                    }
                }
                if (s < a.sets && isPlaying) {
                    await speak("组间休息");
                    await timer(a.actionRest, "组间休息", "SET REST");
                }
            }
            if (i < db.actions.length - 1 && isPlaying) {
                await speak("更换动作");
                await timer(a.groupRest, "动作大休", "BREAK");
            }
        }
        if (isPlaying) finishTraining();
    }

    function timer(sec, title, status) {
        return new Promise(res => {
            let left = sec;
            document.getElementById('subText').innerText = title;
            document.getElementById('statusText').innerText = status;
            document.getElementById('mainTime').innerText = left;
            
            timerInterval = setInterval(async () => {
                if (!isPlaying || skipFlag) { clearInterval(timerInterval); skipFlag = false; res(); return; }
                if (isPaused) return;
                
                left--;
                document.getElementById('mainTime').innerText = left;
                if (left <= 3 && left > 0) speak(left.toString()); 
                if (left <= 0) { clearInterval(timerInterval); res(); }
            }, 1000);
        });
    }

    // --- UI 渲染与控制 ---
    function updateSessionUI() {
        const m = Math.floor(totalSessionSeconds / 60).toString().padStart(2, '0');
        const s = (totalSessionSeconds % 60).toString().padStart(2, '0');
        document.getElementById('sessionTime').innerText = `${m}:${s}`;
    }

    function render() {
        const list = document.getElementById('currentActionList');
        list.innerHTML = db.actions.map((a, i) => `
            <div class="list-item">
                <div class="sort-btns">
                    <button class="sort-btn" onclick="moveAction(${i},-1)"><span class="material-symbols-rounded">expand_less</span></button>
                    <button class="sort-btn" onclick="moveAction(${i},1)"><span class="material-symbols-rounded">expand_more</span></button>
                </div>
                <div class="action-content">
                    <strong>${a.name}</strong><br>
                    <small>${a.sets}组 | ${a.reps}次 | ${a.work}s</small>
                </div>
                <button onclick="deleteAction(${i})" style="border:none;background:none;color:var(--error);"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');
    }

    function moveAction(idx, dir) {
        if(dir === -1 && idx > 0) [db.actions[idx], db.actions[idx-1]] = [db.actions[idx-1], db.actions[idx]];
        else if(dir === 1 && idx < db.actions.length-1) [db.actions[idx], db.actions[idx+1]] = [db.actions[idx+1], db.actions[idx]];
        syncLocal();
    }

    function skipCurrent() { skipFlag = true; speak("已跳过"); }
    function stopTrainer() { if(confirm("强制停止？")) finishTraining(); }

    function finishTraining() {
        isPlaying = false; clearInterval(timerInterval); clearInterval(sessionInterval);
        document.getElementById('playIcon').innerText = 'play_arrow';
        document.getElementById('stopBtn').classList.add('hidden');
        document.getElementById('mainTime').innerText = '00';
        speak("训练圆满完成");
        saveHistory();
    }

    // --- 基础辅助 ---
    function setTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        render();
    }
    function updateRate() { db.rate = document.getElementById('ttsRate').value; document.getElementById('rateLabel').innerText = db.rate; syncLocal(false); }
    function saveAction() { const n = document.getElementById('name').value || '未命名'; db.actions.push({ name: n, sets: parseInt(document.getElementById('sets').value)||1, reps: parseInt(document.getElementById('reps').value)||1, work: parseInt(document.getElementById('work').value)||5, repRest: parseInt(document.getElementById('repRest').value)||2, isAlt: document.getElementById('isAlt').checked, switchRest: 3, actionRest: 10, groupRest: 15 }); syncLocal(); }
    function deleteAction(i) { db.actions.splice(i,1); syncLocal(); }
    function syncLocal(push = true) { localStorage.setItem(DB_KEY, JSON.stringify(db)); render(); }
    function toggleSyncFields() { const m = document.getElementById('syncMode').value; document.getElementById('s3Fields').classList.toggle('hidden', m !== 's3'); }
    function updateMediaMetadata(t, s) { if ('mediaSession' in navigator) { navigator.mediaSession.metadata = new MediaMetadata({ title: t, artist: 'REHAB PRO', album: s }); } }
    
    window.onload = () => { 
        document.getElementById('ttsRate').value = db.rate;
        document.getElementById('rateLabel').innerText = db.rate;
        render(); 
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', handlePlay);
            navigator.mediaSession.setActionHandler('pause', handlePlay);
            navigator.mediaSession.setActionHandler('nexttrack', skipCurrent);
        }
    };
</script>
</body>
</html>
