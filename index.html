<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REHAB PRO V20</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0061a4">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --primary: #0061a4; --on-primary: #ffffff; --primary-container: #d1e4ff;
            --on-primary-container: #001d36; --surface: #fdfcff; --surface-variant: #f1f3f8;
            --outline: #73777f; --tertiary: #7d5260; --error: #ba1a1a;
        }
        body {
            background-color: var(--surface); color: #1a1c1e;
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0;
            padding: env(safe-area-inset-top) 8px 120px 8px;
            display: flex; flex-direction: column; align-items: center;
        }
        /* 极度压缩的 Header */
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 8px; box-sizing: border-box; }
        .brand-mini { display: flex; align-items: center; gap: 6px; }
        .logo-mini { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-mini span { color: white; font-size: 18px; }
        .brand-text { font-weight: 800; font-size: 15px; color: var(--primary); }

        .tabs { display: flex; width: 100%; max-width: 500px; background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 8px 2px; border-radius: 8px; border: none; background: transparent; font-weight: 600; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .tab-btn.active { background: var(--primary-container); color: var(--on-primary-container); }

        .card { background: white; border-radius: 16px; padding: 14px; width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        .timer-panel { background: var(--on-primary-container); color: white; text-align: center; position: relative; }
        #mainTime { font-size: 72px; font-weight: 800; line-height: 1; margin: 6px 0; color: var(--primary-container); }
        .progress-info { display: flex; justify-content: space-around; font-size: 12px; opacity: 0.8; margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; }

        .list-item { background: white; padding: 8px 12px; border-radius: 12px; margin: 5px 0; display: flex; align-items: center; border: 1px solid #eee; }
        .action-content { flex: 1; margin-left: 8px; cursor: pointer; }
        .sort-btns { display: flex; flex-direction: column; gap: 1px; }
        .sort-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 4px; padding: 1px; line-height: 0; cursor: pointer; }
        .sort-btn span { font-size: 16px; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .span-3 { grid-column: span 3; }
        input { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn { height: 40px; border-radius: 8px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 12px; align-items: center; z-index: 1000; }
        .fab { width: 60px; height: 60px; border-radius: 18px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border: none; box-shadow: 0 4px 12px rgba(0,97,164,0.3); }
        .fab-stop { width: 44px; height: 44px; background: var(--error); }
        .section { display: none; width: 100%; max-width: 500px; }
        .section.active { display: block; }
        .hidden { display: none; }
        #silentAudio { display: none; }
    </style>
</head>
<body>

    <audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <header class="header">
        <div class="brand-mini">
            <div class="logo-mini"><span class="material-symbols-rounded">fitness_center</span></div>
            <div class="brand-text">REHAB PRO</div>
        </div>
        <div id="syncStatus" style="font-size: 10px; font-weight: bold; color: gray;">● LOCAL</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" id="btn-workout" onclick="setTab('workout')">训练</button>
        <button class="tab-btn" id="btn-routines" onclick="setTab('routines')">方案库</button>
        <button class="tab-btn" id="btn-history" onclick="setTab('history')">历史</button>
        <button class="tab-btn" id="btn-sync" onclick="setTab('sync')">同步</button>
    </nav>

    <!-- 1. 训练主页 -->
    <div id="workout" class="section active">
        <div class="card timer-panel">
            <div id="statusText" style="font-size: 11px; font-weight: bold; color: var(--primary-container);">READY</div>
            <div id="mainTime">00</div>
            <div id="subText" style="font-size: 15px; font-weight: bold;">等待开始</div>
            <div class="progress-info">
                <div>组: <span id="curSet">0</span>/<span id="totalSet">0</span></div>
                <div>次: <span id="curRep">0</span>/<span id="totalRep">0</span></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:11px; font-weight:600;">语速: <span id="rateLabel">1.1</span>x</span>
                <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1.1" style="width:120px;" oninput="updateRate()">
            </div>
            <div class="input-grid">
                <input type="text" id="name" class="span-3" placeholder="动作名称">
                <input type="number" id="sets" placeholder="组数">
                <input type="number" id="reps" placeholder="次数">
                <input type="number" id="work" placeholder="坚持(s)">
                <input type="number" id="repRest" placeholder="次间休(s)">
                <input type="number" id="actionRest" placeholder="组间休(s)">
                <input type="number" id="groupRest" placeholder="项间休(s)">
                <div class="span-3" style="display:flex; align-items:center; justify-content:space-between; font-size:12px; background:#f5f5f5; padding:6px; border-radius:8px;">
                    <span>左右交替</span> <input type="checkbox" id="isAlt">
                </div>
                <input type="number" id="switchRest" class="span-3" placeholder="换边休息时长 (秒)">
            </div>
            <button class="btn btn-primary" onclick="saveAction()" id="saveBtn" style="margin-top:8px;">添加到训练列表</button>
        </div>

        <div id="currentActionList"></div>

        <div class="card" style="border: 1px dashed #ccc; background:transparent;">
            <input type="text" id="newRoutineName" placeholder="为此方案命名..." style="margin-bottom:6px;">
            <button class="btn btn-primary" style="background:var(--tertiary);" onclick="saveToRoutines()">保存为固定方案</button>
        </div>
    </div>

    <!-- 2. 同步设置 -->
    <div id="sync" class="section">
        <div class="card">
            <h3 style="margin:0 0 10px 0; font-size:16px;">S3/WebDAV 同步</h3>
            <select id="syncMode" onchange="toggleSyncFields()" style="margin-bottom:8px; width:100%; padding:8px; border-radius:8px;">
                <option value="none">仅本地</option>
                <option value="webdav">WebDAV</option>
                <option value="s3">S3 兼容协议 (CAS 数据胶囊)</option>
            </select>
            <div id="s3Fields" class="hidden">
                <input type="text" id="s3Endpoint" placeholder="Endpoint (含 https://)" style="margin-bottom:5px;">
                <input type="text" id="s3Bucket" placeholder="Bucket Name" style="margin-bottom:5px;">
                <input type="text" id="s3Region" placeholder="Region" style="margin-bottom:5px;">
                <div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" id="s3Key" placeholder="Access Key"><input type="password" id="s3Secret" placeholder="Secret Key"></div>
            </div>
            <div id="webdavFields" class="hidden">
                <input type="text" id="davUrl" placeholder="WebDAV 地址" style="margin-bottom:5px;">
                <div style="display:flex; gap:5px;"><input type="text" id="davUser" placeholder="用户名"><input type="password" id="davPass" placeholder="应用密码"></div>
            </div>
            <button class="btn btn-primary" onclick="testAndSaveSync()" style="margin-top:10px;">保存并拉取云端配置</button>
        </div>
    </div>

    <div id="routines" class="section"><div id="routineList"></div></div>
    <div id="history" class="section"><div id="historyList"></div></div>

    <div class="controls">
        <button class="fab fab-stop hidden" id="stopBtn" onclick="stopTrainer()"><span class="material-symbols-rounded">stop</span></button>
        <button class="fab" onclick="handlePlay()"><span class="material-symbols-rounded" style="font-size:40px;" id="playIcon">play_arrow</span></button>
    </div>

<script>
    // --- 签名算法 ---
    async function sha256(str) { const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str)); return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join(""); }
    async function hmac(key, data) { const cKey = typeof key === "string" ? new TextEncoder().encode(key) : key; const cryptoKey = await crypto.subtle.importKey("raw", cKey, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]); return await crypto.subtle.sign("HMAC", cryptoKey, new TextEncoder().encode(data)); }

    // --- 数据持久化 ---
    let db = {
        actions: JSON.parse(localStorage.getItem('rp_v20_a')) || [],
        routines: JSON.parse(localStorage.getItem('rp_v20_r')) || [],
        history: JSON.parse(localStorage.getItem('rp_v20_h')) || [],
        config: JSON.parse(localStorage.getItem('rp_v20_cfg')) || { mode:'none', dav:{}, s3:{} },
        rate: localStorage.getItem('rp_v20_rate') || 1.1,
        isPlaying: false, isPaused: false, timer: null
    };

    function syncLocal(push = true) {
        localStorage.setItem('rp_v20_a', JSON.stringify(db.actions));
        localStorage.setItem('rp_v20_r', JSON.stringify(db.routines));
        localStorage.setItem('rp_v20_h', JSON.stringify(db.history));
        localStorage.setItem('rp_v20_cfg', JSON.stringify(db.config));
        localStorage.setItem('rp_v20_rate', db.rate);
        if(push && db.config.mode !== 'none') syncPush();
        render();
    }

    // --- S3 签名请求 ---
    async function s3Req(method, body = null) {
        const { endpoint, bucket, region, key, secret } = db.config.s3;
        const host = new URL(endpoint).host;
        const path = `/${bucket}/rehab_data_v20.json`;
        const datetime = new Date().toISOString().replace(/[:\-]|\.\d{3}/g, '');
        const date = datetime.slice(0, 8);
        const hashedPayload = body ? await sha256(body) : "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855";
        const canonicalRequest = `${method}\n${path}\n\nhost:${host}\nx-amz-content-sha256:${hashedPayload}\nx-amz-date:${datetime}\n\nhost;x-amz-content-sha256;x-amz-date\n${hashedPayload}`;
        const scope = `${date}/${region}/s3/aws4_request`;
        const stringToSign = `AWS4-HMAC-SHA256\n${datetime}\n${scope}\n${await sha256(canonicalRequest)}`;
        const kDate = await hmac("AWS4" + secret, date);
        const kRegion = await hmac(kDate, region);
        const kService = await hmac(kRegion, "s3");
        const kSigning = await hmac(kService, "aws4_request");
        const signature = Array.from(new Uint8Array(await hmac(kSigning, stringToSign))).map(b => b.toString(16).padStart(2, "0")).join("");
        return fetch(`${endpoint}${path}`, { method, headers: { 'Authorization': `AWS4-HMAC-SHA256 Credential=${key}/${scope}, SignedHeaders=host;x-amz-content-sha256;x-amz-date, Signature=${signature}`, 'x-amz-date': datetime, 'x-amz-content-sha256': hashedPayload }, body });
    }

    async function davReq(method, body = null) {
        const { url, user, pass } = db.config.dav;
        const auth = btoa(`${user}:${pass}`);
        return fetch(url.endsWith('/') ? url+'rehab_v20.json' : url+'/rehab_v20.json', { method, headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }, body });
    }

    async function syncPush() {
        if(db.config.mode === 'none') return;
        updateStatus("● UPLOADING", "orange");
        const data = JSON.stringify({ a:db.actions, r:db.routines, h:db.history, rate:db.rate });
        try {
            const res = (db.config.mode === 's3') ? await s3Req('PUT', data) : await davReq('PUT', data);
            updateStatus(res.ok ? "● SYNCED" : "● ERROR", res.ok ? "green" : "red");
        } catch(e) { updateStatus("● OFFLINE", "red"); }
    }

    async function autoPull() {
        if(db.config.mode === 'none') return;
        updateStatus("● PULLING", "orange");
        try {
            const res = (db.config.mode === 's3') ? await s3Req('GET') : await davReq('GET');
            if(res.ok) {
                const cloud = await res.json();
                db.actions = cloud.a || []; db.routines = cloud.r || []; db.history = cloud.h || []; db.rate = cloud.rate || 1.1;
                syncLocal(false); updateStatus("● SYNCED", "green");
            }
        } catch(e) { updateStatus("● ERROR", "red"); }
    }

    function updateStatus(t, c) { const el = document.getElementById('syncStatus'); el.innerText = t; el.style.color = c; }
    function toggleSyncFields() {
        const m = document.getElementById('syncMode').value;
        document.getElementById('s3Fields').classList.toggle('hidden', m !== 's3');
        document.getElementById('webdavFields').classList.toggle('hidden', m !== 'webdav');
    }
    function testAndSaveSync() {
        db.config.mode = document.getElementById('syncMode').value;
        db.config.s3 = { endpoint:document.getElementById('s3Endpoint').value, bucket:document.getElementById('s3Bucket').value, region:document.getElementById('s3Region').value, key:document.getElementById('s3Key').value, secret:document.getElementById('s3Secret').value };
        db.config.dav = { url:document.getElementById('davUrl').value, user:document.getElementById('davUser').value, pass:document.getElementById('davPass').value };
        syncLocal(false);
        autoPull().then(() => alert("配置已保存并尝试拉取云端数据"));
    }

    // --- 训练逻辑 ---
    function updateRate() { db.rate = document.getElementById('ttsRate').value; document.getElementById('rateLabel').innerText = db.rate; syncLocal(false); }
    function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-CN'; u.rate=parseFloat(db.rate); window.speechSynthesis.speak(u); }

    async function runSequence() {
        for (let i = 0; i < db.actions.length; i++) {
            const a = db.actions[i];
            document.getElementById('totalSet').innerText = a.sets;
            document.getElementById('totalRep').innerText = a.reps;
            for (let s = 1; s <= a.sets; s++) {
                if (!db.isPlaying) return;
                document.getElementById('curSet').innerText = s;
                const sides = a.isAlt ? ['左侧', '右侧'] : [''];
                for (let side of sides) {
                    if (!db.isPlaying) return;
                    speak(s === 1 && side === sides[0] ? `开始：${a.name}` : (side || `第${s}组`));
                    for (let r = 1; r <= a.reps; r++) {
                        if (!db.isPlaying) return;
                        document.getElementById('curRep').innerText = r;
                        speak(`第${r}次`); await timer(a.work, `${a.name} ${side}`, 'HOLD');
                        if (r < a.reps && db.isPlaying) await timer(a.repRest, "放松", "REST");
                    }
                    if (a.isAlt && side === '左侧' && db.isPlaying) await timer(a.switchRest, "换边", "SWITCH");
                }
                if (s < a.sets && db.isPlaying) await timer(a.actionRest, "组间休息", "SET REST");
            }
            if (i < db.actions.length - 1 && db.isPlaying) await timer(a.groupRest, "下一项", "BREAK");
        }
        stopTrainer(true);
    }

    function timer(sec, title, status) {
        return new Promise(res => {
            let left = sec;
            document.getElementById('subText').innerText = title;
            document.getElementById('statusText').innerText = status;
            const t = setInterval(() => {
                if (!db.isPlaying) { clearInterval(t); res(); return; }
                if (db.isPaused) return;
                document.getElementById('mainTime').innerText = left;
                if (left <= 3 && left > 0) speak(left.toString());
                if (left <= 0) { clearInterval(t); res(); }
                left--;
            }, 1000);
        });
    }

    function stopTrainer(comp = false) {
        db.isPlaying = false; clearInterval(db.timer);
        document.getElementById('playIcon').innerText = 'play_arrow';
        document.getElementById('stopBtn').classList.add('hidden');
        if(comp) {
            speak("训练圆满完成");
            const d = Math.round((Date.now()-db.startTime)/1000);
            db.history.unshift({date:new Date().toLocaleString(), duration:d, actions:[...db.actions]});
            syncLocal();
        }
    }

    async function handlePlay() {
        if (!db.isPlaying) {
            if (db.actions.length === 0) return;
            db.isPlaying = true; db.isPaused = false; db.startTime = Date.now();
            document.getElementById('playIcon').innerText = 'pause';
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('silentAudio').play();
            await runSequence();
        } else {
            db.isPaused = !db.isPaused;
            document.getElementById('playIcon').innerText = db.isPaused ? 'play_arrow' : 'pause';
        }
    }

    function setTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function saveAction() {
        const a = { name: document.getElementById('name').value || '未命名', sets: parseInt(document.getElementById('sets').value) || 1, reps: parseInt(document.getElementById('reps').value) || 1, work: parseInt(document.getElementById('work').value) || 5, repRest: parseInt(document.getElementById('repRest').value) || 2, isAlt: document.getElementById('isAlt').checked, switchRest: parseInt(document.getElementById('switchRest').value) || 3, actionRest: parseInt(document.getElementById('actionRest').value) || 10, groupRest: parseInt(document.getElementById('groupRest').value) || 15 };
        db.actions.push(a); syncLocal(); document.getElementById('name').value = '';
    }

    function saveToRoutines() {
        const n = document.getElementById('newRoutineName').value;
        if(!n || db.actions.length === 0) return;
        db.routines.push({ name: n, actions: JSON.parse(JSON.stringify(db.actions)) });
        document.getElementById('newRoutineName').value = ''; syncLocal(); alert("方案已入库");
    }

    function render() {
        document.getElementById('currentActionList').innerHTML = db.actions.map((a, i) => `
            <div class="list-item">
                <div class="sort-btns">
                    <button class="sort-btn" onclick="moveAction(${i},-1)"><span class="material-symbols-rounded">expand_less</span></button>
                    <button class="sort-btn" onclick="moveAction(${i},1)"><span class="material-symbols-rounded">expand_more</span></button>
                </div>
                <div class="action-content" onclick="db.actions.splice(${i},1); syncLocal();">
                    <strong>${a.name}</strong><br><small>${a.sets}组 x ${a.reps}次 | ${a.work}s</small>
                </div>
                <button onclick="db.actions.splice(${i},1);syncLocal();" style="border:none;background:none;color:var(--error);"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');

        document.getElementById('routineList').innerHTML = db.routines.map((r, i) => `<div class="list-item"><strong>${r.name}</strong><button class="tab-btn active" style="width:auto; margin-left:10px;" onclick="db.actions=JSON.parse(JSON.stringify(db.routines[${i}].actions)); syncLocal(); setTab('workout');">载入</button></div>`).join('');
        document.getElementById('historyList').innerHTML = db.history.map(h => `<div class="list-item" style="flex-direction:column; align-items:flex-start;"><small>${h.date}</small><strong>时长: ${Math.floor(h.duration/60)}分</strong></div>`).join('');
    }

    function moveAction(idx, dir) { if(dir===-1 && idx>0) [db.actions[idx], db.actions[idx-1]] = [db.actions[idx-1], db.actions[idx]]; else if(dir===1 && idx<db.actions.length-1) [db.actions[idx], db.actions[idx+1]] = [db.actions[idx+1], db.actions[idx]]; syncLocal(); }

    function initUI() {
        const cfg = db.config;
        document.getElementById('syncMode').value = cfg.mode;
        if(cfg.mode === 's3') { document.getElementById('s3Endpoint').value = cfg.s3.endpoint; document.getElementById('s3Bucket').value = cfg.s3.bucket; document.getElementById('s3Region').value = cfg.s3.region; document.getElementById('s3Key').value = cfg.s3.key; document.getElementById('s3Secret').value = cfg.s3.secret; }
        if(cfg.mode === 'webdav') { document.getElementById('davUrl').value = cfg.dav.url; document.getElementById('davUser').value = cfg.dav.user; document.getElementById('davPass').value = cfg.dav.pass; }
        toggleSyncFields();
    }

    if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
</script>
</body>
</html>
